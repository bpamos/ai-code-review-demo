name: PR Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Job 1: Run ESLint on source, tests, and review script
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # Job 2: Scan changed PR files for hardcoded secrets with GitLeaks
  gitleaks:
    name: GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      # Scan full changed files at PR HEAD (not git diff hunks) so secrets
      # are detected even when split across lines in the patch view.
      - name: Scan changed files for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA")
          if [ -z "$FILES" ]; then
            echo "No changed files to scan."
            exit 0
          fi

          FOUND=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            [ -f "$file" ] || continue
            case "$file" in
              src/*|tests/*|review.js) ;;
              *) continue ;;
            esac
            echo "Scanning ${file}..."
            if ! gitleaks detect --no-git --source "$file" --redact --verbose; then
              FOUND=1
            fi
          done <<< "$FILES"

          if [ "$FOUND" -ne 0 ]; then
            echo "GitLeaks found hardcoded secrets in changed files."
            exit 1
          fi

  # Job 3: Run AI code review and post comment on the PR
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI code review
        run: node review.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # Job 4: Final gate — all three checks must pass before merge
  final-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, gitleaks, ai-review]
    steps:
      - name: Verify all jobs succeeded
        run: echo "All pipeline checks passed. PR is ready to merge."
